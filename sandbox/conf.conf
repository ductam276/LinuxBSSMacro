source = ~/macro_monitor.conf
exec-once = hyprctl dispatch exec "[class ^(beeswarm)$] foot --class beeswarm sh $MACRO_DIR/sandbox/sandbox.sh"
general{
gaps_out = 0
gaps_in = 0
allow_tearing = true
}

decoration{
rounding = 0
blur {
enabled = false
}
shadow {
enabled = false
}
}

animations {
    enabled = false
}

render{
    new_render_scheduling = true
}
cursor{
    min_refresh_rate = 1
}
ecosystem{
    no_update_news = true
    no_donation_nag = true
}

misc{
    disable_hyprland_logo = true
    vrr = 2
    render_unfocused_fps = 60
    disable_xdg_env_checks = true
    anr_missed_pings = 3
    animate_manual_resizes = false
}

bind = CTRL, M, exec, bash -c $MACRO_DIR/start.sh
bind = CTRL, K, exec, bash -c $MACRO_DIR/close.sh
bind = CTRL, Q, exec, bash -c $MACRO_DIR/test.sh
